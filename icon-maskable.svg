<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid slice">
  <!-- Полностью залитый квадрат под maskable safe-zone -->
  <rect width="512" height="512" fill="#6e1f1f"/>

  <!-- Wordmark в safe-zone (примерно центр 80%) -->
  <g fill="#f5e7c8" font-family="Georgia, 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="256" y="170" font-size="72" letter-spacing="2">НТК/ПА</text>
  </g>

  <line x1="156" y1="200" x2="356" y2="200" stroke="#a8895e" stroke-width="2" opacity=".55"/>

  <!-- Поезд -->
  <g fill="#d8b377" stroke-linejoin="round">
    <rect x="124" y="252" width="100" height="60" rx="5"/>
    <path d="M124 252 L124 234 L200 234 L224 252 Z"/>
    <rect x="138" y="260" width="28" height="18" fill="#6e1f1f"/>
    <rect x="174" y="260" width="44" height="18" fill="#6e1f1f"/>
    <circle cx="148" cy="318" r="12" fill="#d8b377" stroke="#6e1f1f" stroke-width="3"/>
    <circle cx="186" cy="318" r="12" fill="#d8b377" stroke="#6e1f1f" stroke-width="3"/>
    <path d="M224 312 L274 312 L258 260 L240 260 Z"/>
  </g>

  <!-- Стрелка-связка -->
  <g fill="none" stroke="#d8b377" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 224 348 C 256 380, 288 380, 320 354"/>
    <path d="M 314 344 L 320 354 L 308 360"/>
  </g>

  <!-- Корабль -->
  <g fill="#d8b377" stroke-linejoin="round">
    <rect x="346" y="234" width="30" height="48" rx="2"/>
    <path d="M361 246 L364 254 L372 254 L366 260 L368 268 L361 263 L354 268 L356 260 L350 254 L358 254 Z" fill="#6e1f1f"/>
    <rect x="316" y="282" width="104" height="20"/>
    <path d="M302 302 L432 302 L408 340 L326 340 Z"/>
    <circle cx="344" cy="320" r="4" fill="#6e1f1f"/>
    <circle cx="370" cy="320" r="4" fill="#6e1f1f"/>
    <circle cx="396" cy="320" r="4" fill="#6e1f1f"/>
  </g>

  <path d="M 286 358 Q 316 368, 348 358 T 412 358"
        fill="none" stroke="#d8b377" stroke-width="4" stroke-linecap="round" opacity=".7"/>
</svg>
