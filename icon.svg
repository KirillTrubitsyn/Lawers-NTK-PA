<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid slice">
  <!-- Полностью залитый квадрат — iOS не добавит белые поля -->
  <rect width="512" height="512" fill="#6e1f1f"/>

  <!-- Wordmark "НТК/ПА" -->
  <g fill="#f5e7c8" font-family="Georgia, 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="256" y="138" font-size="84" letter-spacing="2">НТК/ПА</text>
  </g>

  <!-- Декоративная разделительная линия -->
  <line x1="120" y1="170" x2="392" y2="170" stroke="#a8895e" stroke-width="2" opacity=".55"/>

  <!-- Поезд (слева) -->
  <g fill="#d8b377" stroke="#d8b377" stroke-linejoin="round">
    <!-- Корпус -->
    <rect x="78" y="240" width="120" height="70" rx="6"/>
    <!-- Крыша/нос -->
    <path d="M78 240 L78 220 L168 220 L198 240 Z"/>
    <!-- Окно кабины -->
    <rect x="92" y="248" width="34" height="22" fill="#6e1f1f"/>
    <!-- Решётка -->
    <rect x="135" y="248" width="55" height="22" fill="#6e1f1f"/>
    <line x1="148" y1="252" x2="148" y2="266" stroke="#d8b377" stroke-width="1.5"/>
    <line x1="160" y1="252" x2="160" y2="266" stroke="#d8b377" stroke-width="1.5"/>
    <line x1="172" y1="252" x2="172" y2="266" stroke="#d8b377" stroke-width="1.5"/>
    <line x1="184" y1="252" x2="184" y2="266" stroke="#d8b377" stroke-width="1.5"/>
    <!-- Колёса -->
    <circle cx="106" cy="318" r="14" fill="#d8b377" stroke="#6e1f1f" stroke-width="3"/>
    <circle cx="148" cy="318" r="14" fill="#d8b377" stroke="#6e1f1f" stroke-width="3"/>
    <circle cx="190" cy="318" r="14" fill="#d8b377" stroke="#6e1f1f" stroke-width="3"/>
    <!-- Вагон-конус (груз) -->
    <path d="M198 310 L260 310 L240 250 L218 250 Z" fill="#d8b377"/>
  </g>

  <!-- Кривая дорога/стрелка от поезда к кораблю -->
  <g fill="none" stroke="#d8b377" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 200 350 C 240 388, 280 388, 320 360"/>
    <!-- Наконечник стрелы -->
    <path d="M 314 348 L 320 360 L 308 366" stroke-width="6"/>
  </g>

  <!-- Корабль (справа) -->
  <g fill="#d8b377" stroke="#d8b377" stroke-linejoin="round">
    <!-- Дымовая труба / надстройка -->
    <rect x="350" y="220" width="34" height="54" rx="2"/>
    <!-- Звезда на надстройке -->
    <path d="M367 234 L370 244 L380 244 L372 250 L375 260 L367 254 L359 260 L362 250 L354 244 L364 244 Z" fill="#6e1f1f"/>
    <!-- Палуба -->
    <rect x="316" y="274" width="118" height="22"/>
    <!-- Корпус -->
    <path d="M300 296 L450 296 L424 340 L326 340 Z" fill="#d8b377"/>
    <!-- Иллюминаторы -->
    <circle cx="346" cy="318" r="5" fill="#6e1f1f"/>
    <circle cx="376" cy="318" r="5" fill="#6e1f1f"/>
    <circle cx="406" cy="318" r="5" fill="#6e1f1f"/>
  </g>

  <!-- Волна -->
  <path d="M 286 360 Q 320 372, 354 360 T 422 360 T 480 360"
        fill="none" stroke="#d8b377" stroke-width="4" stroke-linecap="round" opacity=".7"/>
</svg>
